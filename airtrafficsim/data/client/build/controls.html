<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Aircraft Controls</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #1e1e1e;
  color: white;
  padding: 15px;
}

h2 {
  margin-bottom: 10px;
}

#addBtn {
  width: 100%;
  background: #4CAF50;
  color: white;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-bottom: 15px;
}

.aircraft {
  background: #2a2a2a;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
}

.aircraft h4 {
  margin: 0 0 5px 0;
}

input, select {
  width: 100%;
  margin-bottom: 6px;
  padding: 6px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 6px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.deleteBtn {
  float: right;
  background: #e53935;
  color: white;
}

.updateBtn {
  width: 100%;
  background: #2196F3;
  color: white;
}

/* MODAL */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

#modalContent {
  background: #2a2a2a;
  padding: 15px;
  border-radius: 10px;
  width: 300px;
}
</style>
</head>

<body>

<h2>Aircraft Controls</h2>
<button id="addBtn">➕ Add Aircraft</button>

<div id="controls"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">

    <h3>Add Aircraft</h3>

    <input id="cs" placeholder="Callsign">
    <input id="tp" placeholder="Type">

    <select id="ph">
      <option>AT_GATE_ORIGIN</option>
      <option>TAXI_ORIGIN</option>
      <option>TAKEOFF</option>
      <option>INITIAL_CLIMB</option>
      <option>CLIMB</option>
      <option>CRUISE</option>
      <option>DESCENT</option>
      <option>APPROACH</option>
      <option>LANDING</option>
      <option>TAXI_DEST</option>
      <option>AT_GATE_DEST</option>
    </select>

    <input id="lat" placeholder="Lat">
    <input id="lon" placeholder="Lon">
    <input id="hdg" placeholder="Heading">
    <input id="alt" placeholder="Altitude">
    <input id="spd" placeholder="Speed">

    <button id="createBtn">Create</button>
  </div>
</div>

<script>
const socket = io("http://localhost:6111");
const root = document.getElementById("controls");

const modal = document.getElementById("modal");

let editingAircraft = null;

// RENDER
function render(list){
  root.innerHTML = "";

  list.forEach(ac => {

    const isEditing = editingAircraft === ac.id;

    const div = document.createElement("div");
    div.className = "aircraft";

    div.innerHTML =
      "<h4>"+ac.name+" ("+ac.type+")</h4>" +
      "<button class='deleteBtn'>❌</button>" +

      "Heading:<input type='range' min='0' max='360' class='h'>" +
      "Altitude:<input type='number' class='a'>" +
      "Speed:<input type='number' class='s'>" +

      "<button class='updateBtn'>Update</button>";

    const h = div.querySelector(".h");
    const a = div.querySelector(".a");
    const s = div.querySelector(".s");

    if (!isEditing) {
      h.value = ac.heading;
      a.value = ac.altitude;
      s.value = ac.tas;
    }

    [h,a,s].forEach(el=>{
      el.addEventListener("focus", ()=> editingAircraft = ac.id);
      el.addEventListener("blur", ()=> editingAircraft = null);
    });

    // UPDATE
    div.querySelector(".updateBtn").onclick = ()=>{
      socket.emit("setAircraftState",{
        ac_id: ac.id,
        heading: +h.value,
        altitude: +a.value,
        tas: +s.value
      });

      editingAircraft = null;
    };

    // DELETE
    div.querySelector(".deleteBtn").onclick = ()=>{
      socket.emit("deleteAircraft",{ac_id: ac.id});
    };

    root.appendChild(div);
  });
}

// OPEN MODAL
document.getElementById("addBtn").onclick = () => {
  modal.style.display = "flex";
};

// CLOSE MODAL
modal.onclick = (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
};

// CREATE AIRCRAFT
document.getElementById("createBtn").onclick = () => {

  socket.emit("addAircraft",{
    callsign: cs.value,
    type: tp.value,
    phase: ph.value,
    lat: lat.value,
    lon: lon.value,
    heading: hdg.value,
    altitude: alt.value,
    speed: spd.value
  });

  modal.style.display = "none";
};

// AUTO UPDATE
setInterval(()=>socket.emit("getAircraftList"),1000);
socket.on("aircraftList", render);

</script>

</body>
</html>
