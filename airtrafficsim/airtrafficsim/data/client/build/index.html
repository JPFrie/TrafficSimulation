<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>AirTrafficSim</title>
  <base href="/"/>

  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <!-- Cesium -->
  <script defer src="/cesium/Cesium.js"></script>
  <link href="/cesium/Widgets/widgets.css" rel="stylesheet">

  <!-- React App -->
  <script defer src="/static/js/main.74ad484a.js"></script>
  <link href="/static/css/main.87c44448.css" rel="stylesheet">

  <!-- Control Button Style -->
  <style>
    #openBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 9999;

      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: white;

      padding: 10px 16px;
      border-radius: 10px;
      border: none;

      cursor: pointer;
      font-weight: bold;
      font-size: 14px;

      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #openBtn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <!-- Control Button -->
  <button id="openBtn"> A/C Controls</button>

  <!-- Script -->
  <script>
    console.log("Main UI loaded");

    document.getElementById("openBtn").addEventListener("click", function () {

      console.log("Opening control window");

      const win = window.open(
        "/controls.html",
        "_blank",
        "width=450,height=750"
      );

      if (!win) {
        alert("Popup wurde blockiert. Bitte Popups erlauben.");
      }
    });
  </script>

</body>
</html>
